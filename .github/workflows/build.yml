name: Build Firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← tohle chybělo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true    # ← tohle chybělo

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32dev

      - name: Commit firmware.bin + version.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          cp .pio/build/esp32dev/firmware.bin firmware.bin
          echo "${{ github.sha }}" > version.txt
          git add firmware.bin version.txt
          git diff --staged --quiet || git commit -m "ci: update firmware [skip ci]"
          git push
